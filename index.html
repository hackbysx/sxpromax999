<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>♻️😈🛡️👿👺XS PRO MAX</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    body {
      background-color: #010103;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      color: #00ff66;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 15px;
    }
    
    /* Neon Cyber Border Glow */
    .main-panel {
      position: relative; width: 100%; max-width: 450px;
      background: rgba(8, 8, 15, 0.98);
      border-radius: 24px; padding: 25px 20px; z-index: 10;
      border: 2px solid #00ffcc;
      box-shadow: 0 0 20px #00ffcc, inset 0 0 12px rgba(0, 255, 204, 0.2);
    }
    
    /* Widget Glow Style */
    .widget-box {
      background: #040408;
      border: 1px solid #ff0055;
      border-radius: 16px; padding: 15px; margin-bottom: 15px;
      box-shadow: 0 0 12px rgba(255, 0, 85, 0.3);
    }
    
    /* Styled Glitch Name Design */
    .styled-title {
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 1px;
      color: #fff;
      text-shadow: 0 0 5px #ff0055, 0 0 10px #ff0055, 0 0 20px #ff0055;
      font-family: 'Impact', sans-serif;
    }
    
    /* Neon Text Shadows */
    .neon-text-cyan {
      color: #00ffcc;
      text-shadow: 0 0 8px #00ffcc, 0 0 15px rgba(0, 255, 204, 0.6);
    }
    .neon-text-pink {
      color: #ff0055;
      text-shadow: 0 0 8px #ff0055, 0 0 15px rgba(255, 0, 85, 0.6);
    }
    .neon-text-green {
      color: #00ff66;
      text-shadow: 0 0 8px #00ff66, 0 0 15px rgba(0, 255, 102, 0.6);
    }

    .matrix-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
    .matrix-box { 
      background: #030306; 
      border: 1px solid rgba(0, 255, 204, 0.3); 
      border-radius: 12px; padding: 12px 5px; text-align: center; 
    }
    
    /* Engine Core Neon Display */
    .engine-core { 
      background: #000000; 
      border: 2px solid #00ff66; 
      border-radius: 20px; padding: 20px; margin-bottom: 15px; text-align: center;
      box-shadow: 0 0 15px rgba(0, 255, 102, 0.25), inset 0 0 15px rgba(0, 255, 102, 0.1);
    }
    .timer-text { font-size: 36px; font-weight: 900; color: #ff0055; text-shadow: 0 0 10px #ff0055; margin: 5px 0; }
    
    /* Target Slots */
    .num-slot-row { display: flex; justify-content: center; gap: 20px; margin-top: 15px; }
    .target-slot { 
      width: 70px; height: 70px; background: #020204; 
      border: 2px solid #00ffcc; border-radius: 16px; 
      display: flex; align-items: center; justify-content: center; 
      font-size: 34px; font-weight: 900; color: #fff; 
      text-shadow: 0 0 10px #00ffcc; box-shadow: 0 0 12px rgba(0, 255, 204, 0.3); 
    }

    /* Chronicles Neon Log */
    .chronicles-card { background: #020204; border: 1px solid rgba(0, 255, 204, 0.2); border-radius: 16px; padding: 15px; }
    .chronicles-container { max-height: 150px; overflow-y: auto; }
    .chronicles-row { display: grid; grid-template-columns: 1.2fr 1fr 1fr 1fr; padding: 8px 5px; border-bottom: 1px solid rgba(0, 255, 204, 0.1); font-size: 12px; text-align: center; font-weight: bold; }
    
    .live-tag {
      display: flex; align-items: center; gap: 6px; background: rgba(0, 255, 102, 0.1);
      border: 1px solid #00ff66; padding: 4px 10px; border-radius: 50px;
      font-size: 10px; font-weight: 900; color: #00ff66; box-shadow: 0 0 8px rgba(0, 255, 102, 0.2);
    }
    .pulse-dot {
      width: 6px; height: 6px; background-color: #00ff66; border-radius: 50%;
      box-shadow: 0 0 8px #00ff66; animation: dotPulse 1s infinite alternate;
    }
    @keyframes dotPulse { 0% { opacity: 1; } 100% { opacity: 0.3; } }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: #00ffcc; }
  </style>
</head>
<body>

<div class="main-panel">
  <div class="widget-box flex justify-between items-center">
    <div class="flex items-center gap-1">
      <span class="styled-title">♻️😈🛡️𝗫𝗦 𝗣𝗥𝗢 𝗠𝗔𝗫👺👿</span>
    </div>
    <div class="live-tag">
      <span class="pulse-dot"></span>
      <span>RUNNING 50</span>
    </div>
  </div>

  <div class="matrix-grid">
    <div class="matrix-box"><div class="matrix-val neon-text-cyan font-black text-lg" id="runningBig">0</div><div class="text-[9px] font-bold text-gray-400 mt-1">WINDOW BIG</div></div>
    <div class="matrix-box"><div class="matrix-val neon-text-green font-black text-lg" id="runningSmall">0</div><div class="text-[9px] font-bold text-gray-400 mt-1">WINDOW SMALL</div></div>
    <div class="matrix-box"><div class="matrix-val text-white font-black text-xs pt-1" id="skewStatus">CALC...</div><div class="text-[9px] font-bold text-gray-400 mt-1">BIAS SIDE</div></div>
  </div>

  <div class="engine-core">
    <div class="text-xs font-black text-white tracking-widest uppercase mb-1" id="currentPeriodDisplay">SYNCING API ISSUES...</div>
    <div class="timer-text" id="timerDisplay">00:00</div>
    <div class="text-[9px] font-black text-gray-400 tracking-wider uppercase mt-2 mb-1">TARGET COMBINATION SHORTS</div>
    <div class="num-slot-row">
      <div class="target-slot" id="shortNum1">-</div>
      <div class="target-slot" id="shortNum2">-</div>
    </div>
  </div>

  <div class="chronicles-card">
    <h3 class="text-[10px] font-black tracking-widest text-cyan-400 mb-2 uppercase border-b border-cyan-500/20 pb-1"><i class="fas fa-server mr-1"></i> SLIDING WINDOW LOOP (MAX 50)</h3>
    <div class="chronicles-container" id="logBox"></div>
  </div>
</div>

<script>
  let targetedPeriod = "";

  function bootEngine() {
    setInterval(fetchSlidingWindow, 2000);
    setInterval(() => {
      const secRemaining = 60 - new Date().getSeconds();
      document.getElementById('timerDisplay').innerText = `00:${secRemaining < 10 ? '0' + secRemaining : secRemaining}`;
    }, 1000);
  }

  async function fetchSlidingWindow() {
    try {
      // SLIDING RUNNING WINDOW API CONFIG
      const url = `https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json?pageNo=1&pageSize=50&ts=${Date.now()}`;
      const res = await fetch(url);
      const json = await res.json();
      const runningList = json.data.list;
      
      const nextIssue = (BigInt(runningList[0].issueNumber) + 1n).toString();
      document.getElementById('currentPeriodDisplay').innerText = `TARGET ISSUE: ${nextIssue}`;
      
      if (runningList[0].issueNumber !== targetedPeriod) {
        targetedPeriod = runningList[0].issueNumber;
        executeRunning50Logic(runningList);
      }
    } catch (e) { console.error("Network Wait...", e); }
  }

  function executeRunning50Logic(runningList) {
    let bigCount = 0;
    let smallCount = 0;
    let numberFrequencies = Array(10).fill(0);

    // DYNAMIC EVALUATOR FOR EXACTLY 50 CURRENT ITEMS
    runningList.forEach(item => {
      const num = parseInt(item.number);
      numberFrequencies[num]++;
      if (num >= 5) bigCount++; else smallCount++;
    });

    document.getElementById('runningBig').innerText = bigCount;
    document.getElementById('runningSmall').innerText = smallCount;
    
    // EXECUTING YOUR PROFIT CONTRARIAN THEORY
    let expectedSide = "SMALL";
    let targetNumbersPool = [0, 1, 2, 3, 4]; // DEFAULT TARGET TO SMALL

    if (bigCount < smallCount) {
      expectedSide = "BIG";
      targetNumbersPool = [5, 6, 7, 8, 9]; // SWING SURGE TO BIG
      document.getElementById('skewStatus').innerHTML = '<span class="text-emerald-400">SMALL OVER</span>';
    } else {
      document.getElementById('skewStatus').innerHTML = '<span class="text-cyan-400">BIG OVER</span>';
    }

    // LOCKING THE 2 LOWEST FREQUENCY NUMBERS FROM THE SELECTED SIDE
    targetNumbersPool.sort((a, b) => numberFrequencies[a] - numberFrequencies[b]);
    let bestShort1 = targetNumbersPool[0];
    let bestShort2 = targetNumbersPool[1];

    document.getElementById('shortNum1').innerText = bestShort1;
    document.getElementById('shortNum2').innerText = bestShort2;
    
    renderWindowLog(runningList);
  }

  function renderWindowLog(runningList) {
    const container = document.getElementById('logBox');
    container.innerHTML = "";
    
    // RENDER LIVE SLIDING STREAM 
    runningList.forEach(item => {
      const num = parseInt(item.number);
      const side = num >= 5 ? "BIG" : "SMALL";
      const row = document.createElement('div');
      row.className = "chronicles-row";
      row.innerHTML = `
        <span class="text-gray-500">${item.issueNumber.slice(-5)}</span>
        <span style="color:${side === 'BIG' ? '#00ffcc' : '#00ff66'}">${side}</span>
        <span class="font-bold text-white">${num}</span>
        <span class="text-[10px] ${num % 2 !== 0 ? 'text-green-400' : 'text-red-500'}">${num % 2 !== 0 ? 'GREEN' : 'RED'}</span>
      `;
      container.appendChild(row);
    });
  }

  window.onload = bootEngine;
</script>
</body>
</html>
